name: New Tool Entry
description: Submit a new security tool to the OWASP LLM Top 10 tools directory.
title: "New Tool: [Tool Name]"
labels: ["new-content", "tool"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a tool entry! This form adds a tool to the
        community tools directory. Tools must be relevant to LLM security.
        Read [CONTRIBUTING.md](../CONTRIBUTING.md) before submitting.

  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      description: The official name of the tool.
      placeholder: "e.g., Garak, PromptBench, LLMFuzzer"
    validations:
      required: true

  - type: checkboxes
    id: owasp-categories
    attributes:
      label: Relevant OWASP LLM Categories
      description: Select all OWASP LLM Top 10 categories this tool addresses.
      options:
        - label: "LLM01 - Prompt Injection"
        - label: "LLM02 - Insecure Output Handling"
        - label: "LLM03 - Training Data Poisoning"
        - label: "LLM04 - Model Denial of Service"
        - label: "LLM05 - Supply Chain Vulnerabilities"
        - label: "LLM06 - Sensitive Information Disclosure"
        - label: "LLM07 - Insecure Plugin Design"
        - label: "LLM08 - Excessive Agency"
        - label: "LLM09 - Overreliance"
        - label: "LLM10 - Model Theft"

  - type: dropdown
    id: tool-type
    attributes:
      label: Tool Type
      description: What category best describes this tool?
      options:
        - Red Team / Offensive Testing
        - Blue Team / Defensive
        - Auditing / Scanning
        - Monitoring / Observability
        - Guardrails / Filtering
        - Dataset / Benchmark
        - Framework / SDK
        - Other
    validations:
      required: true

  - type: input
    id: project-url
    attributes:
      label: Project / Documentation URL
      description: The official project website or documentation URL.
      placeholder: "https://example.com/docs"
    validations:
      required: true

  - type: input
    id: github-url
    attributes:
      label: GitHub Repository URL
      description: The GitHub (or equivalent) source code repository URL.
      placeholder: "https://github.com/org/repo"
    validations:
      required: false

  - type: input
    id: license
    attributes:
      label: License
      description: The open-source license under which this tool is distributed.
      placeholder: "e.g., MIT, Apache-2.0, GPL-3.0, Proprietary"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Tool Description
      description: >
        Describe what this tool does, its key features, and why it is useful
        for LLM security practitioners. Include install/usage notes if relevant.
      placeholder: |
        Garak is an LLM vulnerability scanner that probes models for
        weaknesses including prompt injection, data leakage, and hallucination.
        It supports OpenAI, Hugging Face, and custom endpoints.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: I have read CONTRIBUTING.md and my submission meets the guidelines.
          required: true
        - label: This tool is relevant to LLM security and at least one OWASP LLM Top 10 category.
          required: true
        - label: The tool is publicly accessible (open source or free tier available).
          required: true
        - label: I am not affiliated with this tool in a way that creates a conflict of interest, OR I have disclosed my affiliation in the description.
          required: true
